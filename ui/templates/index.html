<!DOCTYPE html>
<html lang="ru" class="h-full bg-zinc-950 text-zinc-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIN Core Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS layers: theme vars -> base -> chat -> runtime -> overrides -> theme -> avatar. -->
    <link rel="stylesheet" href="/static/css/themes_font_size.css?v=theme-font-size-1">
    <link rel="stylesheet" href="/static/css/base.css?v=jin-color-sequence-1">
    <link rel="stylesheet" href="/static/css/chat.css?v=theme-font-size-1">
    <link rel="stylesheet" href="/static/css/chat-rating.css?v=css-split-1">
    <link rel="stylesheet" href="/static/css/chat-runtime-action.css?v=jin-color-sequence-1">
    <link rel="stylesheet" href="/static/css/runtime-memory.css?v=memory-line-avatar-hover-1">
    <link rel="stylesheet" href="/static/css/interface-overrides.css?v=css-split-1">
    <link rel="stylesheet" href="/static/css/theme-win95.css?v=theme-font-size-1">
    <link rel="stylesheet" href="/static/css/runtime-avatar.css?v=runtime-avatar-10">
</head>
<body class="h-screen overflow-hidden flex flex-col font-mono antialiased bg-zinc-950 text-zinc-100">

<!-- TOP BAR -->

<header
        class="h-10 border-b border-zinc-800 bg-zinc-900 flex items-center justify-between px-4 text-xs tracking-wider text-zinc-400 shrink-0">

    <button
            id="app-title"
            type="button"
            class="text-left uppercase">
        [JIN CORE ENGINE]
    </button>

    <div class="grid w-72 grid-cols-2 items-center">

        <!-- SERVICE -->

        <div id="service-status"
             class="flex items-center justify-center gap-1.5 text-zinc-400">

        <span id="service-dot"
              class="h-2 w-2 rounded-full {{ 'bg-emerald-400 animate-pulse' if runtime_status.service else 'bg-red-500' }} transition-all duration-300">
        </span>

            <span id="service-label"
                  class="inline-block min-w-14">
            SERVICE
        </span>

        </div>

        <!-- BRAIN -->

        <div id="brain-status"
             class="flex items-center justify-center gap-1.5 text-zinc-400">

        <span id="brain-dot"
              class="h-2 w-2 rounded-full {{ 'bg-emerald-400 animate-pulse' if runtime_status.brain else 'bg-red-500' }} transition-all duration-300">
        </span>

            <span id="brain-label"
                  class="inline-block min-w-14">
            BRAIN
        </span>

        </div>

    </div>

</header>

<!-- MAIN -->

<main class="flex flex-1 overflow-hidden relative isolate">
    <div id="scene-bg"
         class="absolute inset-0 bg-cover bg-center opacity-80 pointer-events-none">
    </div>
    <div id="scene-clutter-overlay"
         class="absolute inset-0 pointer-events-none"
         aria-hidden="true">
    </div>
    <div id="scene-cluttered-overlay"
         class="absolute inset-0 pointer-events-none"
         aria-hidden="true">
    </div>
    <div id="scene-search-overlay"
         class="absolute inset-0 pointer-events-none"
         aria-hidden="true">
    </div>
    <div id="scene-jin-tint"
         class="absolute inset-0 pointer-events-none"
         aria-hidden="true">
    </div>

    <div id="scene-shade"
         class="absolute inset-0 pointer-events-none">
    </div>

    <!-- LEFT CONSOLE -->

    <section id="console-panel"
             class="absolute z-30
                        rounded-xl border border-zinc-700/70
                        bg-zinc-950/80 backdrop-blur-md
                        shadow-[0_18px_60px_rgba(0,0,0,0.55)]
                        flex flex-col overflow-hidden">

        <div id="console-drag-handle"
             class="h-10 border-b border-zinc-800/80 flex items-center justify-between px-4
           bg-zinc-900/50 cursor-grab active:cursor-grabbing select-none">

            <h3 id="console-title"
                class="text-xs font-bold uppercase tracking-widest text-zinc-300">
                DATA STREAM CONSOLE
            </h3>

            <div class="win95-window-controls" aria-hidden="true">
                <span class="win95-window-button win95-window-button-min">_</span>
                <span class="win95-window-button win95-window-button-max"></span>
                <span class="win95-window-button win95-window-button-close">x</span>
            </div>

        </div>

        <div id="console-stream"
             class="flex-1 overflow-y-auto p-4 space-y-4 text-[11px] leading-relaxed text-zinc-400">
        </div>

    </section>

    <!-- CENTER CHAT -->

    <section id="chat-drop-zone"
             class="flex-1 flex flex-col
                        bg-transparent
                        border-r border-zinc-800 relative z-10">

        <!-- CHAT HISTORY -->

        <div id="chat-history"
             class="flex-1 overflow-y-auto
                        pt-6 pb-6
                        space-y-6 text-sm
                        bg-transparent">
            <!--
                            <div class="space-y-2">

                                <div
                                    class="border-l border-slate-500 pl-4 text-xs text-zinc-300 italic leading-relaxed">
                                    User requested a layout. Enforcing zero-fluff principle. Testing token budget logic...
                                </div>

                            </div>
            -->
            <!-- MESSAGE -->

            <div class="mx-auto flex w-full max-w-3xl items-start gap-3">
                <!--
                                    <div
                                        class="h-6 w-6 rounded bg-slate-600 border border-slate-500 flex items-center justify-center text-[10px] text-zinc-200 shrink-0">
                                        JN
                                    </div>

                                    <div
                                        class="bg-slate-600 border border-slate-500 rounded-xl px-4 py-3 text-sm text-zinc-100 shadow-sm whitespace-pre-wrap break-words"></div>
                -->
            </div>

        </div>

        <!-- INPUT -->

        <div id="chat-input-shell" class="bg-transparent py-4 shrink-0">

            <form id="chat-form"
                  class="relative w-full max-w-none flex items-center bg-black/30
                               border border-zinc-800
                               backdrop-blur-sm rounded-lg px-4 py-2 transition">

                <!-- ATTACH -->

                <label for="file-input"
                       class="hidden p-2 rounded-lg cursor-pointer text-zinc-200 hover:bg-slate-500 transition shrink-0">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5"
                         stroke="currentColor"
                         class="w-5 h-5">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94a3 3 0 114.243 4.243L8.63 15.347a1.5 1.5 0 11-2.122-2.122l8-8"></path>

                    </svg>

                    <input type="file"
                           id="file-input"
                           class="hidden"
                           multiple
                           accept="image/*,application/json,text/*">

                </label>

                <!-- TEXTAREA -->

                <textarea id="user-input"
                          rows="1"
                          placeholder="Enter your message.."
                          class="w-full bg-transparent resize-none border-none outline-none focus:outline-none focus:ring-0 text-sm leading-5 text-zinc-100 placeholder-zinc-300 max-h-28 py-1"></textarea>

                <div id="stop-indicator"
                     class="pointer-events-none absolute inset-0 hidden items-center justify-center text-red-100">

                        <span
                                class="h-3 w-3 rounded-[2px] bg-red-200 shadow-[0_0_14px_rgba(248,113,113,0.75)]">
                        </span>

                </div>

                <!-- SEND -->

                <button type="submit"
                        class="hidden p-2 rounded-lg bg-slate-500 hover:bg-slate-400 transition text-zinc-100 shrink-0">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5"
                         stroke="currentColor"
                         class="w-5 h-5">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"></path>

                    </svg>

                </button>

            </form>

            <!-- ATTACHED FILES -->

            <div id="attached-files"
                 class="max-w-4xl mx-auto mt-3 flex flex-wrap gap-2">
            </div>

            <!--  <div
                  id="runtime-diff-panel"
                  class="rounded border bg-zinc-900 border-zinc-800">

              <div class="p-3 space-y-3 font-mono">

                  <div
                          class="runtime-memory-header flex items-center justify-between gap-2 border-b border-purple-400/60 text-[11px] uppercase tracking-widest text-slate-100">

                      <span class="min-w-0 truncate">
                          [ memory diffs ]
                      </span>

                      <button
                              id="runtime-diff-toggle"
                              type="button"
                              class="shrink-0 text-purple-300 transition hover:text-purple-100">
                          show diffs
                      </button>

                  </div>

                  <div
                          id="runtime-diff-summary"
                          class="grid grid-cols-2 gap-x-3 gap-y-1 text-[11px] leading-relaxed text-zinc-300">
                      <span>count: <b id="runtime-diff-count" class="font-normal text-purple-200">0</b></span>
                      <span>avg: <b id="runtime-diff-average" class="font-normal text-purple-200">0</b></span>
                      <span>range: <b id="runtime-diff-range" class="font-normal text-purple-200">0</b></span>
                      <span>max: <b id="runtime-diff-max" class="font-normal text-purple-200">0</b></span>
                  </div>

                  <pre
                          id="runtime-diff-text"
                          class="hidden max-h-52 overflow-auto whitespace-pre-wrap break-words border-t border-zinc-800 pt-3 text-[11px] leading-relaxed text-zinc-100"></pre>

              </div>

          </div>

          --> </div>

    </section>

    <!-- RIGHT SETTINGS -->

    <section id="settings-panel"
             class="absolute z-30
                        rounded-xl border border-zinc-700/70
                        bg-zinc-950/80 backdrop-blur-md
                        shadow-[0_18px_60px_rgba(0,0,0,0.55)]
                        flex flex-col overflow-hidden">

        <div id="memory-drag-handle"
             class="border-b border-zinc-800/80
                           flex items-center
                           bg-zinc-900/50
                           cursor-grab active:cursor-grabbing
                           select-none">

            <div class="jin-runtime-avatar-shell">
                <div
                        id="jin-runtime-avatar"
                        class="jin-runtime-avatar"
                        aria-hidden="true">
                </div>

                <button
                        id="fact-check-trigger"
                        type="button"
                        title="Refresh avatar"
                        aria-label="Refresh avatar"
                        class="jin-runtime-avatar-core-button">
                </button>
            </div>

            <div class="win95-window-controls" aria-hidden="true">
                <span class="win95-window-button win95-window-button-min">_</span>
                <span class="win95-window-button win95-window-button-max"></span>
                <span class="win95-window-button win95-window-button-close">x</span>
            </div>

        </div>

        <div
                class="settings-scroll flex-1 overflow-y-auto p-4 space-y-4 text-xs text-zinc-300 leading-relaxed">

            <div
                    class="grid grid-cols-2 overflow-hidden rounded border bg-zinc-900 border-zinc-800">

                <button
                        type="button"
                        id="service-context-tab"
                        data-context-tab="service"
                        disabled
                        aria-disabled="true"
                        aria-selected="false"
                        class="h-8 border-r border-slate-500/70 text-[11px] font-bold uppercase tracking-widest text-slate-500 cursor-not-allowed">
                    Service
                </button>

                <button
                        type="button"
                        id="brain-context-tab"
                        data-context-tab="brain"
                        disabled
                        aria-disabled="true"
                        aria-selected="false"
                        class="h-8 text-[11px] font-bold uppercase tracking-widest text-slate-500 cursor-not-allowed">
                    Brain
                </button>

            </div>

            <div
                    id="context-runtime-panel"
                    class="hidden rounded border bg-zinc-900 border-zinc-800">

                <div class="p-3 space-y-3 font-mono">

                    <div
                            id="context-panel-model"
                            class="truncate text-[11px] font-bold text-zinc-100">
                        {{ runtime_config.service.model }}
                    </div>

                    <div id="context-accordion">

                        <div
                                class="flex items-center justify-between gap-2 border-y border-slate-500/70 py-2 text-[11px] uppercase tracking-widest text-slate-100">

                                <span class="min-w-0 truncate">
                                    [ context ]
                                </span>

                            <span
                                    id="context-summary-tokens"
                                    class="flex w-[8ch] shrink-0 flex-col items-end text-right leading-tight tabular-nums text-zinc-100">
                                    <span id="context-summary-used" class="whitespace-nowrap">0&nbsp;/</span>
                                    <span id="context-summary-max" class="whitespace-nowrap">{{ runtime_config.service.max_tokens }}</span>
                                </span>

                        </div>

                        <div class="pt-3">

                            <div
                                    id="context-window-line"
                                    class="flex w-full items-center gap-2 text-[11px] text-emerald-300">

                                    <span
                                            id="context-window-bar"
                                            class="block min-w-0 flex-1 overflow-hidden whitespace-pre">
                                        [................]
                                    </span>

                                <span
                                        id="context-window-percent"
                                        class="w-[4ch] shrink-0 text-right tabular-nums">
                                        0%
                                    </span>

                            </div>

                            <div
                                    id="summarizer-window-line"
                                    class="mt-2 flex w-full items-center gap-2 text-[11px] text-emerald-300">

                                    <span
                                            id="summarizer-window-bar"
                                            class="block min-w-0 flex-1 overflow-hidden whitespace-pre">
                                        [................]
                                    </span>

                                <span
                                        id="summarizer-window-percent"
                                        class="w-[4ch] shrink-0 text-right tabular-nums">
                                        0%
                                    </span>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <div
                    id="runtime-memory-panel"
                    class="rounded border bg-zinc-900 border-zinc-800">

                <div class="p-3 space-y-3 font-mono">

                    <div
                            class="runtime-memory-header flex items-center justify-between gap-2 border-b border-slate-500/70 text-[11px] uppercase tracking-widest text-slate-100">

                            <span
                                    id="runtime-memory-title"
                                    class="min-w-0 truncate">
                                [ runtime memory ]
                            </span>

                        <span class="shrink-0 flex items-center gap-2 text-emerald-300">
                            <button id="runtime-memory-prev" type="button">&lt;</button>
                            <span
                                    id="runtime-memory-position"
                                    role="button"
                                    tabindex="0"
                                    title="Toggle persistent runtime memory highlight"
                            >0</span>
                            <button id="runtime-memory-next" type="button">&gt;</button>
                        </span>

                    </div>

                    <pre
                            id="runtime-memory-text"
                            class="min-h-28 whitespace-pre-wrap break-words text-[11px] leading-relaxed text-zinc-100">This session has just begun. You have no history with the user yet.</pre>

                </div>

            </div>

        </div>

    </section>

</main>


<script src="/static/js/win95-theme.js?v=win95-theme-1"></script>


<script src="/static/js/answer-rating.js?v=answer-rating-1"></script>

<!-- AUTO HEIGHT -->

<script src="/static/js/textarea-auto-height.js?v=textarea-auto-height-1"></script>
<template id="jin-runtime-config">
    {{ {
    "useServiceAsBrain": use_service_as_brain,
    "runtimeStatus": runtime_status,
    "runtimeConfig": runtime_config,
    } | tojson }}
</template>
<script src="/static/js/runtime/runtime-core.js?v=runtime-core-1"></script>
<script src="/static/js/runtime/runtime-storage.js?v=runtime-storage-8"></script>
<script src="/static/js/runtime/runtime-memory-model.js?v=runtime-memory-model-1"></script>
<script src="/static/js/runtime/runtime-idle.js?v=runtime-idle-1"></script>
<script src="/static/js/runtime/runtime-feedback.js?v=runtime-feedback-1"></script>
<script src="/static/js/runtime/runtime-session.js?v=runtime-session-4"></script>
<script src="/static/js/runtime/runtime-panel.js?v=runtime-panel-1"></script>
<script src="/static/js/runtime/runtime-memory-view.js?v=runtime-memory-view-7"></script>
<script src="/static/js/runtime/runtime.js?v=runtime-facade-8"></script>
<script src="/static/js/runtime/runtime-avatar.js?v=jin-default-dark-blue-1"></script>
<script src="/static/js/status.js?v=status-check-4"></script>
<script src="/static/js/dragdrop.js?v=attachments-3"></script>
<script src="/static/js/logger.js?v=facts-memory-log-1"></script>
<script src="/static/js/think-citations.js?v=think-citations-1"></script>
<script src="/static/js/chat.js?v=marker-repetition-fix-1"></script>
<script src="/static/js/socket.js?v=facts-memory-log-2"></script>
</body>

</html>
