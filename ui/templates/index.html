<!DOCTYPE html>
<html lang="ru" class="h-full bg-zinc-950 text-zinc-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIN Core Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #09090b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        :root {
            --panel-gap: 24px;
            --panel-width: 330px;

            --safe-left: 380px;
            --safe-right: 380px;

            --chat-max-width: 820px;

            /* Вертикальный ритм чата: добавляет немного воздуха между ходами. */
            --chat-turn-gap: 2.05rem;
            --chat-inner-gap: 0.85rem;
            --chat-question-gap: 2.55rem;
            --chat-history-edge-gap: 1.9rem;
        }

        body {
            min-width: 900px;
        }

        #scene-bg {
            background-size: cover;
            background-position: center;
        }

        #console-panel,
        #settings-panel {
            width: var(--panel-width);
            max-height: calc(100% - (var(--panel-gap) * 2));
        }

        #console-panel.panel-collapsed,
        #settings-panel.panel-collapsed {
            height: 40px !important;
            min-height: 40px;
            max-height: 40px;
        }

        #console-panel.panel-collapsed #console-stream,
        #settings-panel.panel-collapsed .settings-scroll {
            display: none;
        }

        #console-panel {
            left: var(--panel-gap);
            top: var(--panel-gap);
            height: calc(100% - (var(--panel-gap) * 2));
        }

        @keyframes factCheckGlowPulse {
            0%, 100% {
                box-shadow:
                        0 0 0 1px rgba(56, 189, 248, 0.26),
                        0 0 18px rgba(59, 130, 246, 0.22),
                        0 0 48px rgba(37, 99, 235, 0.13),
                        inset 0 0 16px rgba(14, 165, 233, 0.06);
            }

            50% {
                box-shadow:
                        0 0 0 1px rgba(125, 211, 252, 0.46),
                        0 0 28px rgba(96, 165, 250, 0.36),
                        0 0 76px rgba(37, 99, 235, 0.22),
                        inset 0 0 24px rgba(56, 189, 248, 0.10);
            }
        }


        #settings-panel {
            right: var(--panel-gap);
            top: var(--panel-gap);
        }

        #memory-drag-handle {
            flex: 0 0 40px;
            height: 40px;
            min-height: 40px;
        }

        #memory-drag-handle h3 {
            font-size: 12px;
            line-height: 1;
        }

        .settings-scroll {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .settings-scroll::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .runtime-memory-header {
            flex: 0 0 32px;
            height: 32px;
            min-height: 32px;
            font-size: 11px;
            line-height: 1;
        }

        #chat-drop-zone {
            min-width: 0;
            border-right: 0;
        }

        #chat-history {
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
            padding-top: var(--chat-history-edge-gap) !important;
            padding-bottom: var(--chat-history-edge-gap) !important;
            scroll-padding-bottom: calc(var(--chat-history-edge-gap) + 0.5rem);
        }

        #chat-history > :not([hidden]) ~ :not([hidden]) {
            /* Перебивает tailwind space-y-6 и даёт стабильный, чуть более воздушный шаг. */
            margin-top: var(--chat-turn-gap) !important;
        }

        #chat-history > :not([hidden]) ~ :not([hidden]):has(.jin-chat-bubble-user) {
            /* Чуть больше пауза перед новым запросом: визуально отделяет ответ JIN от следующего хода USER. */
            margin-top: var(--chat-question-gap) !important;
        }

        #chat-history > :last-child {
            /* Чтобы последний ход не прилипал к input-панели при автоскролле. */
            margin-bottom: 0.35rem;
        }

        #chat-input-shell {
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        #chat-form {
            width: min(100%, var(--chat-max-width));
            min-width: 520px;

            margin-left: auto;
            margin-right: auto;
        }

        #user-input {
            width: 100%;
        }

        @keyframes memoryGlowPulse {
            0%, 100% {
                box-shadow:
                        0 0 0 1px rgba(255, 190, 100, 0.25),
                        0 0 18px rgba(255, 170, 70, 0.22),
                        0 0 48px rgba(255, 140, 40, 0.12),
                        inset 0 0 16px rgba(255, 170, 70, 0.05);
            }

            50% {
                box-shadow:
                        0 0 0 1px rgba(255, 205, 120, 0.42),
                        0 0 26px rgba(255, 180, 80, 0.34),
                        0 0 72px rgba(255, 145, 45, 0.20),
                        inset 0 0 22px rgba(255, 185, 90, 0.08);
            }
        }

        @keyframes memoryL2GlowPulse {
            0%, 100% {
                box-shadow:
                        0 0 0 1px rgba(255, 255, 255, 0.22),
                        0 0 18px rgba(255, 255, 255, 0.18),
                        0 0 48px rgba(255, 255, 255, 0.10),
                        inset 0 0 16px rgba(255, 255, 255, 0.04);
            }

            50% {
                box-shadow:
                        0 0 0 1px rgba(255, 255, 255, 0.38),
                        0 0 26px rgba(255, 255, 255, 0.28),
                        0 0 72px rgba(255, 255, 255, 0.16),
                        inset 0 0 22px rgba(255, 255, 255, 0.07);
            }
        }

        @keyframes memoryL3GlowPulse {
            0%, 100% {
                box-shadow:
                        0 0 0 1px rgba(190, 120, 255, 0.24),
                        0 0 18px rgba(168, 85, 247, 0.20),
                        0 0 48px rgba(126, 34, 206, 0.12),
                        inset 0 0 16px rgba(168, 85, 247, 0.05);
            }

            50% {
                box-shadow:
                        0 0 0 1px rgba(216, 180, 254, 0.40),
                        0 0 26px rgba(192, 132, 252, 0.32),
                        0 0 72px rgba(147, 51, 234, 0.18),
                        inset 0 0 22px rgba(192, 132, 252, 0.08);
            }
        }

        @keyframes factCheckGlowPulse {
            0%, 100% {
                box-shadow:
                        0 0 0 1px rgba(56, 189, 248, 0.26),
                        0 0 18px rgba(59, 130, 246, 0.22),
                        0 0 48px rgba(37, 99, 235, 0.13),
                        inset 0 0 16px rgba(14, 165, 233, 0.06);
            }

            50% {
                box-shadow:
                        0 0 0 1px rgba(125, 211, 252, 0.46),
                        0 0 28px rgba(96, 165, 250, 0.36),
                        0 0 76px rgba(37, 99, 235, 0.22),
                        inset 0 0 24px rgba(56, 189, 248, 0.10);
            }
        }


        #settings-panel {
            transition:
                    border-color 1.8s ease,
                    box-shadow 1.8s ease;
        }

        #settings-panel.memory-updating {
            border-color: rgba(255,190,95,.50);

            box-shadow:
                    0 0 0 1px rgba(255,190,100,.25),
                    0 0 18px rgba(255,170,70,.22),
                    0 0 48px rgba(255,140,40,.12),
                    inset 0 0 16px rgba(255,170,70,.05);
        }

        #settings-panel.memory-l2-updating {
            border-color: rgba(255, 255, 255, 0.50);

            box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.22),
                    0 0 18px rgba(255, 255, 255, 0.18),
                    0 0 48px rgba(255, 255, 255, 0.10),
                    inset 0 0 16px rgba(255, 255, 255, 0.04);
        }

        #settings-panel.memory-l3-updating {
            border-color: rgba(190, 120, 255, 0.50);

            box-shadow:
                    0 0 0 1px rgba(190, 120, 255, 0.24),
                    0 0 18px rgba(168, 85, 247, 0.20),
                    0 0 48px rgba(126, 34, 206, 0.12),
                    inset 0 0 16px rgba(168, 85, 247, 0.05);
        }

        #settings-panel.memory-updating.memory-pulse {
            animation: memoryGlowPulse 5s ease-in-out infinite;
        }

        #settings-panel.memory-l2-updating.memory-l2-pulse {
            animation: memoryL2GlowPulse 5s ease-in-out infinite;
        }

        #settings-panel.memory-l3-updating.memory-l3-pulse {
            animation: memoryL3GlowPulse 5s ease-in-out infinite;
        }

        #settings-panel.memory-fading {
            border-color: rgba(255, 190, 95, 0.18);

            box-shadow:
                    0 0 0 1px rgba(255, 190, 100, 0.08),
                    0 0 12px rgba(255, 170, 70, 0.10),
                    0 0 32px rgba(255, 140, 40, 0.06),
                    inset 0 0 10px rgba(255, 170, 70, 0.03);
        }

        #settings-panel.memory-l2-fading {
            border-color: rgba(255, 255, 255, 0.18);

            box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.08),
                    0 0 12px rgba(255, 255, 255, 0.10),
                    0 0 32px rgba(255, 255, 255, 0.06),
                    inset 0 0 10px rgba(255, 255, 255, 0.03);
        }

        #settings-panel.memory-l3-fading {
            border-color: rgba(190, 120, 255, 0.18);

            box-shadow:
                    0 0 0 1px rgba(190, 120, 255, 0.08),
                    0 0 12px rgba(168, 85, 247, 0.10),
                    0 0 32px rgba(126, 34, 206, 0.06),
                    inset 0 0 10px rgba(168, 85, 247, 0.03);
        }
        #settings-panel.fact-check-running {
            border-color: rgba(56, 189, 248, 0.58);

            box-shadow:
                    0 0 0 1px rgba(56, 189, 248, 0.28),
                    0 0 20px rgba(59, 130, 246, 0.24),
                    0 0 56px rgba(37, 99, 235, 0.16),
                    inset 0 0 18px rgba(14, 165, 233, 0.06);
        }

        #settings-panel.fact-check-running.fact-check-pulse {
            animation: factCheckGlowPulse 4s ease-in-out infinite;
        }

        #settings-panel.fact-check-fading {
            border-color: rgba(56, 189, 248, 0.20);

            box-shadow:
                    0 0 0 1px rgba(56, 189, 248, 0.09),
                    0 0 12px rgba(59, 130, 246, 0.12),
                    0 0 34px rgba(37, 99, 235, 0.07),
                    inset 0 0 10px rgba(14, 165, 233, 0.03);
        }

        #user-input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        #user-input {
            width: 100%;
            border: none;
            outline: none;
            box-shadow: none;
            transition:
                    border-color 0.5s ease,
                    box-shadow 0.5s ease;
        }

        #user-input:focus {
            border: none;
            outline: none;
            box-shadow: none;
        }


        #chat-form:focus-within {
            border-color: rgba(255,255,255,0.15);
            box-shadow:
                    0 0 0 1px rgba(255,255,255,0.1),
                    0 0 12px rgba(255,255,255,0.2);
        }



        /* =========================
           ЧАТ / БАБЛЫ / АВАТАРКИ
           Подписи для ручной настройки:
           - rgba(..., A): последнее число A = сила слоя / прозрачность.
             Меньше A -> прозрачнее и тише, больше A -> плотнее и ярче.
           - blur(px): сила размытия стекла. Меньше -> резче, больше -> мутнее.
           - box-shadow: внешние и внутренние свечения. Первые строки обычно внешние,
             строки с inset — внутренний свет/объём внутри плашки.
           ========================= */

        :root {
            /* Общий цвет линий/акцентов JIN. Влияет на холодный cyan-вайб интерфейса. */
            --jin-chat-line: rgba(103, 232, 249, 0.60);

            /* Более слабый cyan-акцент для вторичных линий. */
            --jin-chat-line-soft: rgba(103, 232, 249, 0.14);

            /* Базовое внешнее свечение обычного JIN-бабла. */
            --jin-chat-glow: rgba(45, 212, 191, 0.12);

            /* Основной цвет текста JIN до переопределений ниже. */
            --jin-chat-text: rgba(154, 242, 251, 0.95);

            /* Приглушённый текст для think-блока. */
            --jin-chat-muted: rgba(203, 213, 225, 0.62);

            /* Базовая масса обычной JIN-плашки: последнее число = плотность фона. */
            --jin-chat-panel: rgba(8, 17, 22, 0.76);

            /* Базовая масса USER-плашки: главный регулятор прозрачности user-бабла. */
            --jin-chat-panel-user: rgba(14, 21, 31, 0.76);

            /* Базовая масса think-плашки: чем меньше alpha, тем больше она "в воздухе". */
            --jin-chat-panel-think: rgba(12, 12, 14, 0.44);
        }

        .jin-stream-wrapper,
        .jin-message-shell {
            /* Нужна база для внутренних абсолютных/визуальных элементов сообщения. */
            position: relative;
        }

        #chat-history .jin-stream-wrapper + .jin-stream-wrapper,
        #chat-history .jin-stream-wrapper + .jin-message-shell,
        #chat-history .jin-message-shell + .jin-stream-wrapper,
        #chat-history .jin-message-shell + .jin-message-shell {
            /* Фолбэк для динамических сообщений, если они обходят tailwind space-y. */
            margin-top: var(--chat-turn-gap);
        }

        #chat-history .jin-stream-wrapper + .jin-message-shell:has(.jin-chat-bubble-user),
        #chat-history .jin-message-shell + .jin-message-shell:has(.jin-chat-bubble-user) {
            /* Дополнительный воздух именно перед новым пользовательским запросом, без раздувания think -> answer. */
            margin-top: var(--chat-question-gap) !important;
        }

        .jin-message-row {
            /* Горизонтальная строка: аватарка слева, бабл справа. */
            display: flex;

            /* Прижимает аватарку и бабл к верхнему краю строки. */
            align-items: flex-start;

            /* Расстояние между аватаркой и баблом. */
            gap: 12px;
        }

        .jin-chat-avatar {
            /* Размер квадратной аватарки SV/US. */
            width: 28px;
            height: 28px;
            flex: 0 0 28px;

            /* Центровка букв внутри аватарки. */
            display: flex;
            align-items: center;
            justify-content: center;

            /* Скругление аватарки. Сейчас 4px — тот же радиус, что у баблов. */
            border-radius: 4px;

            /* Cyan-рамка JIN/SV-аватарки. Alpha управляет заметностью рамки. */
            border: 1px solid rgba(103, 232, 249, 0.34);

            /* Тёмная cyan-подложка аватарки. */
            background: rgba(7, 20, 26, 0.68);

            /* Цвет букв внутри аватарки. */
            color: rgba(153, 246, 228, 0.95);

            /* Типографика букв SV/US. */
            font-size: 10px;
            line-height: 1;
            letter-spacing: 0.04em;

            /* 1) тонкая тёмная обводка, 2) внешнее cyan-свечение, 3) внутренний свет. */
            box-shadow:
                    0 0 0 1px rgba(0, 0, 0, 0.35),
                    0 0 14px rgba(20, 184, 166, 0.14),
                    inset 0 0 12px rgba(103, 232, 249, 0.04);
        }

        .jin-chat-avatar-user {
            /* Рамка US-аватарки: холоднее и серее, чем у JIN/SV. */
            border-color: rgba(148, 163, 184, 0.42);

            /* Фон US-аватарки: slate/blue-gray. */
            background: rgba(20, 27, 38, 0.70);

            /* Цвет букв US. */
            color: rgba(226, 232, 240, 0.88);

            /* Серое внешнее и внутреннее свечение US-аватарки. */
            box-shadow:
                    0 0 0 1px rgba(0, 0, 0, 0.32),
                    0 0 12px rgba(148, 163, 184, 0.12),
                    inset 0 0 12px rgba(226, 232, 240, 0.03);
        }

        .jin-chat-avatar-brain,
        .jin-chat-avatar-translator {
            /* Цветовая ветка BRAIN/translator-аватарок: немного в фиолетово-синий. */
            border-color: rgba(165, 180, 252, 0.34);
            color: rgba(199, 210, 254, 0.92);
        }

        .jin-chat-avatar.cursor-help:hover {
            /* Hover аватарки: подсказка, что элемент кликабельный/интерактивный. */
            border-color: rgba(110, 231, 183, 0.65);
            color: rgba(236, 253, 245, 0.98);
            background: rgba(13, 34, 34, 0.74);
        }

        .jin-chat-bubble {
            /* Общая база для ВСЕХ баблов: JIN, USER, BRAIN. */
            position: relative;
            flex: 0 1 auto;

            /* Бабл подстраивается под текст, а не растягивается на всю строку. */
            width: fit-content;

            /* Максимальная ширина длинного ответа. Уменьшай, если плашки слишком широкие. */
            max-width: min(100%, 720px);

            /* Защита от переполнения внутри flex-строки. */
            min-width: 0;

            /* Внутренние отступы всех баблов: верх/низ 14px, лево/право 18px. */
            padding: 14px 18px;

            /* Базовый цвет текста до role-specific переопределений. */
            color: var(--jin-chat-text);

            /* Базовый фон: верхний блик + вертикальная стеклянная плёнка + масса плашки. */
            background:
                    radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.075), transparent 42%),
                    linear-gradient(180deg, rgba(255, 255, 255, 0.040), rgba(255, 255, 255, 0.012)),
                    var(--jin-chat-panel);

            /* Бордер отключён: форма держится светом и тенью. */
            border: 0;

            /* Скругление всех баблов. Сейчас совпадает с аватарками. */
            border-radius: 4px;

            /* Срезанные углы отключены. */
            clip-path: none;

            /* Общее стеклянное размытие фона под баблом. */
            backdrop-filter: blur(12px);

            /* Общая глубина: тень вниз, внешнее свечение, внутренний объём. */
            box-shadow:
                    0 10px 34px rgba(0, 0, 0, 0.32),
                    0 0 24px var(--jin-chat-glow),
                    inset 0 0 30px rgba(255, 255, 255, 0.030),
                    inset 0 0 28px rgba(20, 184, 166, 0.035);
        }

        .jin-chat-bubble::before,
        .jin-chat-bubble::after {
            /* Декоративные псевдоэлементы отключены, чтобы не было лишних рамок/углов. */
            content: none;
        }

        .jin-chat-bubble-service {
            /* Старый/базовый shadow для JIN. Ниже есть финальное переопределение JIN-бабла. */
            box-shadow:
                    0 10px 34px rgba(0, 0, 0, 0.34),
                    0 0 28px rgba(20, 184, 166, 0.14),
                    inset 0 0 30px rgba(255, 255, 255, 0.026),
                    inset 0 0 32px rgba(45, 212, 191, 0.05);
        }

        .jin-chat-bubble-user {
            /* Цвет текста USER. Alpha делает текст тише/ярче. */
            color: rgba(226, 235, 246, 0.76);

            /* Радиус USER-бабла. Сейчас как у аватарки. */
            border-radius: 4px;

            /* USER-фон:
               1) верхний blue-блик,
               2) правый мягкий blue-свет,
               3) нижняя slate-глубина,
               4) стеклянная вертикальная плёнка,
               5) основная масса через --jin-chat-panel-user. */
            background:
                    radial-gradient(circle at 18% 0%, rgba(147, 197, 253, 0.052), transparent 44%),
                    radial-gradient(circle at 88% 20%, rgba(96, 165, 250, 0.034), transparent 42%),
                    radial-gradient(circle at 64% 100%, rgba(148, 163, 184, 0.026), transparent 48%),
                    linear-gradient(180deg, rgba(219, 234, 254, 0.034), rgba(15, 23, 42, 0.022)),
                    var(--jin-chat-panel-user);

            /* Размытие USER-бабла. Уменьшай, если плашка слишком мутная. */
            backdrop-filter: blur(9.75px);

            /* USER-тени:
               1) физическая тень,
               2) синее внешнее свечение,
               3) широкая бледная blue-аура,
               4-6) внутренние блики и объём. */
            box-shadow:
                    0 12px 32px rgba(0, 0, 0, 0.23),
                    0 0 28px rgba(96, 165, 250, 0.062),
                    0 0 42px rgba(147, 197, 253, 0.030),
                    inset 0 1px 0 rgba(219, 234, 254, 0.050),
                    inset 0 0 24px rgba(96, 165, 250, 0.018),
                    inset 0 0 28px rgba(147, 197, 253, 0.012);

            /* Очень слабое свечение текста USER. */
            text-shadow:
                    0 0 10px rgba(96, 165, 250, 0.030);
        }

        .jin-chat-bubble-brain,
        .jin-chat-bubble-translator {
            /* Отдельная ветка для BRAIN/translator-баблов: мягкий indigo-оттенок. */
            box-shadow:
                    0 10px 32px rgba(0, 0, 0, 0.32),
                    0 0 24px rgba(129, 140, 248, 0.10),
                    inset 0 0 28px rgba(255, 255, 255, 0.022),
                    inset 0 0 28px rgba(129, 140, 248, 0.035);
        }

        .jin-chat-pre {
            /* Текст внутри бабла: pre нужен для переносов и ASCII/форматирования. */
            margin: 0;

            /* Не даёт тексту вылезать шире бабла. */
            max-width: 100%;
            overflow-x: auto;

            /* Сохраняет переносы, но позволяет длинным строкам ломаться. */
            white-space: pre-wrap;
            overflow-wrap: anywhere;

            /* Наследуем font-family от body/font-mono. */
            font-family: inherit;

            /* Размер и ритм текста в сообщениях. */
            font-size: 13px;
            line-height: 1.72;
            letter-spacing: 0.01em;

            /* Цвет берётся от конкретного бабла. */
            color: inherit;

            /* Базовое cyan-свечение текста; ниже JIN/USER могут переопределять. */
            text-shadow: 0 0 10px rgba(94, 234, 212, 0.08);
        }

        .jin-think-wrapper {
            /* Ширина think-блока совпадает с шириной длинных баблов. */
            max-width: 720px;

            /* Сдвиг think вправо, чтобы он начинался после аватарки. */
            margin-left: 40px;

            /* Небольшая пауза между мыслью и следующим видимым ответом. */
            margin-bottom: var(--chat-inner-gap);

            /* Общая видимость think-блока. Меньше -> больше "в воздухе". */
            opacity: 0.92;
        }

        .jin-think-header {
            /* Строка заголовка <think>. */
            display: flex;
            align-items: center;
            gap: 8px;

            /* Приглушённый цвет заголовка think. */
            color: rgba(203, 213, 225, 0.72);

            /* Размер подписи think. */
            font-size: 11px;

            /* Плавность подсветки при hover. */
            transition: color 0.2s ease;
        }

        .jin-think-header:hover {
            /* Заголовок think становится читабельнее при наведении. */
            color: rgba(226, 232, 240, 0.96);
        }

        .jin-think-content {
            /* Отступ между заголовком <think> и телом мысли. */
            margin-top: 8px;

            /* Внутренние отступы think-плашки. */
            padding: 14px 18px;

            /* Цвет текста think. */
            color: var(--jin-chat-muted);

            /* Think чуть мельче обычного ответа. */
            font-size: 12px;
            line-height: 1.65;

            /* Курсив отделяет мысль от обычного голоса. */
            font-style: italic;

            /* Сохраняет переносы текста think. */
            white-space: pre-wrap;

            /* Масса think-плашки. Регулируется --jin-chat-panel-think. */
            background: var(--jin-chat-panel-think);

            /* Тонкая рамка think-плашки. */
            border: 1px solid rgba(148, 163, 184, 0.14);

            /* Think пока мягче скруглён, чем основные баблы. */
            border-radius: 10px;

            /* Размытие фона под think. */
            backdrop-filter: blur(8px);

            /* Тень и внутренний объём think. */
            box-shadow:
                    0 8px 26px rgba(0, 0, 0, 0.28),
                    inset 0 0 18px rgba(255, 255, 255, 0.025);
        }

        #chat-history .border-l.border-slate-500.pl-4.text-xs.text-zinc-300.italic.leading-relaxed.whitespace-pre-wrap {
            /* Сброс старого tailwind-стиля think: убирает левую линию. */
            border-left: 0 !important;

            /* Сброс старого отступа от левой линии. */
            padding-left: 0 !important;
        }

        .jin-chat-bubble-service {
            /* Финальный JIN-фон:
               1) верхний cyan-блик,
               2) правый teal-свет,
               3) нижняя слабая indigo-глубина,
               4) стеклянная вертикальная плёнка,
               5) основная масса JIN-бабла. */
            background:
                    radial-gradient(circle at 18% 0%, rgba(103, 232, 249, 0.050), transparent 44%),
                    radial-gradient(circle at 86% 18%, rgba(45, 212, 191, 0.040), transparent 42%),
                    radial-gradient(circle at 64% 100%, rgba(129, 140, 248, 0.024), transparent 48%),
                    linear-gradient(180deg, rgba(204, 251, 241, 0.030), rgba(10, 18, 22, 0.022)),
                    rgba(10, 18, 22, 0.48);

            /* Финальный цвет текста JIN. */
            color: rgba(222, 238, 235, 0.86);

            /* Финальное JIN-свечение:
               1) физическая тень,
               2) teal-аура,
               3) cyan-аура,
               4) слабая indigo-глубина,
               5-7) внутренний свет и объём. */
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.24),
                    0 0 32px rgba(45, 212, 191, 0.070),
                    0 0 44px rgba(103, 232, 249, 0.035),
                    0 0 34px rgba(129, 140, 248, 0.018),
                    inset 0 1px 0 rgba(204, 251, 241, 0.045),
                    inset 0 0 26px rgba(45, 212, 191, 0.020),
                    inset 0 0 30px rgba(103, 232, 249, 0.014);
        }

        .jin-chat-bubble-service .jin-chat-pre {
            /* Цвет текста внутри JIN-бабла дублируется здесь для надёжности. */
            color: rgba(222, 238, 235, 0.86);

            /* Свечение текста JIN: teal + cyan. */
            text-shadow:
                    0 0 10px rgba(45, 212, 191, 0.040),
                    0 0 14px rgba(103, 232, 249, 0.024);
        }


        /* =========================
           JIN ANSWER RATING HOVER
           Левая треть ответа = минус: мягкий красный край + лёгкий уход влево.
           Центр = ноль: светло-серая подсветка без продавливания.
           Правая треть = плюс: мягкий зелёный край + лёгкий уход вправо.
           Важно: сам бабл больше не трансформируется, чтобы hit-zone не ездила под курсором.
           ========================= */

        .jin-chat-bubble-service {
            isolation: isolate;
            overflow: hidden;
            transform: translateZ(0);
            cursor: pointer;
            transition:
                    box-shadow 0.22s ease,
                    filter 0.22s ease;
            will-change: box-shadow, filter;
        }

        .jin-chat-bubble-service .jin-rating-hover-zones {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-radius: inherit;
            overflow: hidden;
            pointer-events: none;
        }

        .jin-chat-bubble-service .jin-rating-zone {
            pointer-events: auto;
            background: transparent;
        }

        .jin-chat-bubble-service.jin-rating-l1-waiting .jin-rating-zone {
            cursor: default;
        }

        .jin-chat-bubble-service.jin-rating-l1-waiting {
            filter: saturate(0.92);
        }

        .jin-chat-bubble-service .jin-chat-pre {
            position: relative;
            z-index: 2;
            transition:
                    transform 0.22s ease,
                    text-shadow 0.22s ease;
            transform-origin: center center;
            will-change: transform, text-shadow;
        }

        .jin-chat-bubble-service::before,
        .jin-chat-bubble-service::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            border-radius: inherit;
            transition:
                    opacity 0.22s ease,
                    background 0.22s ease,
                    box-shadow 0.22s ease;
        }

        .jin-chat-bubble-service::before {
            background:
                    linear-gradient(90deg,
                            rgba(248, 113, 113, 0.105) 0%,
                            rgba(248, 113, 113, 0.040) 16%,
                            rgba(248, 113, 113, 0.010) 38%,
                            transparent 68%);
            box-shadow:
                    inset 1px 0 0 rgba(248, 113, 113, 0.05),
                    inset 14px 0 22px rgba(127, 29, 29, 0.105),
                    -6px 0 18px rgba(248, 113, 113, 0.055);
        }

        .jin-chat-bubble-service::after {
            background:
                    linear-gradient(270deg,
                            rgba(74, 222, 128, 0.105) 0%,
                            rgba(74, 222, 128, 0.040) 16%,
                            rgba(74, 222, 128, 0.010) 38%,
                            transparent 68%);
            box-shadow:
                    inset -1px 0 0 rgba(74, 222, 128, 0.05),
                    inset -14px 0 22px rgba(20, 83, 45, 0.105),
                    6px 0 18px rgba(74, 222, 128, 0.055);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-minus:hover) {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.25),
                    0 0 24px rgba(248, 113, 113, 0.050),
                    0 0 28px rgba(45, 212, 191, 0.040),
                    inset 0 1px 0 rgba(204, 251, 241, 0.040),
                    inset 0 0 22px rgba(248, 113, 113, 0.024),
                    inset 0 0 30px rgba(103, 232, 249, 0.010);
            filter: saturate(1.015);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-minus:hover)::before {
            opacity: 1;
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-minus:hover) .jin-chat-pre {
            transform: translateX(-2px) skewY(-0.18deg);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-neutral:hover) {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.24),
                    0 0 30px rgba(226, 232, 240, 0.070),
                    0 0 28px rgba(45, 212, 191, 0.040),
                    inset 0 1px 0 rgba(248, 250, 252, 0.060),
                    inset 0 0 24px rgba(226, 232, 240, 0.035),
                    inset 0 0 30px rgba(103, 232, 249, 0.010);
            filter: brightness(1.03);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-neutral:hover) .jin-chat-pre {
            text-shadow:
                    0 0 10px rgba(226, 232, 240, 0.070),
                    0 0 14px rgba(103, 232, 249, 0.018);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-plus:hover) {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.25),
                    0 0 24px rgba(74, 222, 128, 0.055),
                    0 0 28px rgba(45, 212, 191, 0.040),
                    inset 0 1px 0 rgba(204, 251, 241, 0.040),
                    inset 0 0 22px rgba(74, 222, 128, 0.026),
                    inset 0 0 30px rgba(103, 232, 249, 0.010);
            filter: saturate(1.015);
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-plus:hover)::after {
            opacity: 1;
        }

        .jin-chat-bubble-service:not(.jin-rating-selected-active):not(.jin-rating-committed):has(.jin-rating-zone-plus:hover) .jin-chat-pre {
            transform: translateX(2px) skewY(0.18deg);
        }


        @keyframes jinRatingClickPreMinus {
            0% {
                transform: translateX(-2px) skewY(-0.18deg);
            }

            34% {
                transform: translateX(-3px) skewY(-0.20deg);
            }

            68% {
                transform: translateX(-1px) skewY(-0.08deg);
            }

            100% {
                transform: translateX(-2px) skewY(-0.18deg);
            }
        }

        @keyframes jinRatingClickPreNeutral {
            0% {
                transform: translateZ(0) scale(1);
                text-shadow:
                        0 0 10px rgba(226, 232, 240, 0.12),
                        0 0 20px rgba(226, 232, 240, 0.08),
                        0 0 14px rgba(103, 232, 249, 0.020);
            }

            38% {
                transform: translateZ(0) scale(0.996);
            }

            76% {
                transform: translateZ(0) scale(1.002);
            }

            100% {
                transform: translateZ(0) scale(1);
                text-shadow:
                        0 0 10px rgba(45, 212, 191, 0.040),
                        0 0 14px rgba(103, 232, 249, 0.024);
            }
        }

        @keyframes jinRatingClickPrePlus {
            0% {
                transform: translateX(2px) skewY(0.18deg);
            }

            34% {
                transform: translateX(3px) skewY(0.20deg);
            }

            68% {
                transform: translateX(1px) skewY(0.08deg);
            }

            100% {
                transform: translateX(2px) skewY(0.18deg);
            }
        }

        @keyframes jinRatingClickEdgeMinus {
            0% {
                opacity: 0.95;
            }

            42% {
                opacity: 0.72;
            }

            100% {
                opacity: 0.68;
            }
        }

        @keyframes jinRatingClickEdgePlus {
            0% {
                opacity: 0.95;
            }

            42% {
                opacity: 0.72;
            }

            100% {
                opacity: 0.68;
            }
        }

        .jin-chat-bubble-service.jin-rating-press-neutral {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.24),
                    0 0 34px rgba(226, 232, 240, 0.075),
                    0 0 28px rgba(45, 212, 191, 0.040),
                    inset 0 1px 0 rgba(248, 250, 252, 0.060),
                    inset 0 0 24px rgba(226, 232, 240, 0.035),
                    inset 0 0 30px rgba(103, 232, 249, 0.010);
        }

        .jin-chat-bubble-service.jin-rating-press-minus::before {
            opacity: 1;
            animation: jinRatingClickEdgeMinus 0.62s ease-out forwards;
        }

        .jin-chat-bubble-service.jin-rating-press-plus::after {
            opacity: 1;
            animation: jinRatingClickEdgePlus 0.62s ease-out forwards;
        }

        .jin-chat-bubble-service.jin-rating-press-minus .jin-chat-pre {
            animation: jinRatingClickPreMinus 0.42s cubic-bezier(0.18, 0.92, 0.22, 1.00);
        }

        .jin-chat-bubble-service.jin-rating-press-neutral .jin-chat-pre {
            animation: jinRatingClickPreNeutral 0.44s ease-out;
        }

        .jin-chat-bubble-service.jin-rating-press-plus .jin-chat-pre {
            animation: jinRatingClickPrePlus 0.42s cubic-bezier(0.18, 0.92, 0.22, 1.00);
        }


        .jin-chat-bubble-service.jin-rating-committed::before,
        .jin-chat-bubble-service.jin-rating-committed::after {
            animation: none !important;
        }

        .jin-chat-bubble-service.jin-rating-committed {
            cursor: default;
        }

        .jin-chat-bubble-service.jin-rating-committed .jin-rating-zone {
            pointer-events: none;
            cursor: default;
        }

        .jin-chat-bubble-service.jin-rating-selected-active .jin-rating-zone {
            cursor: pointer;
        }

        .jin-chat-bubble-service.jin-rating-selected-minus {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.25),
                    0 0 28px rgba(248, 113, 113, 0.085),
                    0 0 30px rgba(45, 212, 191, 0.035),
                    inset 0 1px 0 rgba(204, 251, 241, 0.038),
                    inset 0 0 26px rgba(248, 113, 113, 0.042),
                    inset 0 0 30px rgba(103, 232, 249, 0.008);
            filter: saturate(1.035);
        }

        .jin-chat-bubble-service.jin-rating-selected-minus::before {
            opacity: 0.68;
        }

        .jin-chat-bubble-service.jin-rating-selected-minus .jin-chat-pre {
            transform: translateX(-2px) skewY(-0.18deg);
        }

        .jin-chat-bubble-service.jin-rating-selected-neutral {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.24),
                    0 0 34px rgba(226, 232, 240, 0.095),
                    0 0 30px rgba(45, 212, 191, 0.035),
                    inset 0 1px 0 rgba(248, 250, 252, 0.072),
                    inset 0 0 26px rgba(226, 232, 240, 0.048),
                    inset 0 0 30px rgba(103, 232, 249, 0.008);
            filter: brightness(1.04);
        }

        .jin-chat-bubble-service.jin-rating-selected-neutral .jin-chat-pre {
            transform: none;
            text-shadow:
                    0 0 10px rgba(226, 232, 240, 0.070),
                    0 0 14px rgba(103, 232, 249, 0.018);
        }

        .jin-chat-bubble-service.jin-rating-selected-plus {
            box-shadow:
                    0 14px 42px rgba(0, 0, 0, 0.25),
                    0 0 28px rgba(74, 222, 128, 0.092),
                    0 0 30px rgba(45, 212, 191, 0.035),
                    inset 0 1px 0 rgba(204, 251, 241, 0.038),
                    inset 0 0 26px rgba(74, 222, 128, 0.046),
                    inset 0 0 30px rgba(103, 232, 249, 0.008);
            filter: saturate(1.035);
        }

        .jin-chat-bubble-service.jin-rating-selected-plus::after {
            opacity: 0.68;
        }

        .jin-chat-bubble-service.jin-rating-selected-plus .jin-chat-pre {
            transform: translateX(2px) skewY(0.18deg);
        }

        .runtime-memory-line {
            margin: 0 0 10px 0;
            line-height: 1.5;
        }

        .runtime-memory-key,
        .runtime-memory-value {
            color: rgba(244,244,245,0.62);
            transition:
                    color 1.3s ease,
                    text-shadow 1.3s ease;
        }

        #runtime-memory-position {
            cursor: pointer;
            border-radius: 9999px;
            padding: 0 3px;
            transition:
                    color 0.25s ease,
                    text-shadow 0.25s ease,
                    background-color 0.25s ease;
        }

        #runtime-memory-position:hover {
            color: rgba(167,243,208,0.98);
            text-shadow:
                    0 0 8px rgba(16,185,129,0.35);
        }

        #runtime-memory-position.runtime-memory-position-pinned {
            color: rgba(134,239,172,0.98);
            background-color: rgba(16,185,129,0.15);
            text-shadow:
                    0 0 6px rgba(187,247,208,0.95),
                    0 0 14px rgba(34,197,94,0.85),
                    0 0 20px rgba(24,190,114,0.75),
                    0 0 28px rgba(16,185,129,0.55),
                    0 0 42px rgba(5,150,105,0.35);
        }

        #runtime-memory-text.runtime-memory-text-pinned {
            text-shadow:
                    0 0 12px rgba(34,197,94,0.12);
        }

        .runtime-memory-user-idle {
            opacity: 0.72;
        }

        .runtime-memory-user-idle .runtime-memory-key,
        .runtime-memory-user-idle .runtime-memory-value {
            color: rgba(148, 163, 184, 0.88);
            text-shadow: none;
        }

        .runtime-memory-flash-off {
            transition: none !important;
        }

        .runtime-memory-key.flash-new,
        .runtime-memory-value.flash-new {
            color: rgba(134,239,172,0.96);
            text-shadow:
                    0 0 10px rgba(34,197,94,0.35);
        }

        .runtime-memory-key.flash-changed {
            color: rgba(216,180,254,0.96);
            text-shadow:
                    0 0 10px rgba(168,85,247,0.35);
        }

        .runtime-memory-value.flash-changed {
            color: rgba(
                    134,
                    239,
                    172,
                    var(--memory-change-alpha, 0.80)
            );

            text-shadow:
                    0 0 10px rgba(
                            34,
                            197,
                            94,
                            var(--memory-change-glow, 0.22)
                    );
        }



        /* Final bubble geometry pass: both message bubbles use avatar-like corners. */
        .jin-chat-bubble,
        .jin-chat-bubble-service,
        .jin-chat-bubble-user {
            border-radius: 4px;
        }

        .jin-chat-bubble-user .jin-chat-pre {
            color: rgba(226, 235, 246, 0.76);
            text-shadow:
                    0 0 10px rgba(96, 165, 250, 0.030);
        }
    </style>

<script>
    (function () {
        const ratingSelectionClasses = [
            "jin-rating-selected-active",
            "jin-rating-committed",
            "jin-rating-selected-minus",
            "jin-rating-selected-neutral",
            "jin-rating-selected-plus",
            "jin-rating-press-minus",
            "jin-rating-press-neutral",
            "jin-rating-press-plus",
        ];

        function isRatingInteractionBlocked() {
            return Boolean(
                (
                    window.isJinGenerationRunning
                    && window.isJinGenerationRunning()
                )
                || window.jinGenerationRunning
            );
        }

        function clearBubbleRating(bubble, reason = "outside") {
            if (
                !bubble
                || bubble.classList.contains("jin-rating-committed")
                || bubble.dataset.ratingCommitted === "true"
                || isRatingInteractionBlocked()
            ) {
                return;
            }

            const previousRating = bubble.dataset.ratingSelected || null;

            bubble.classList.remove(...ratingSelectionClasses);
            delete bubble.dataset.ratingSelected;
            delete bubble.dataset.ratingPending;

            const zones = bubble.querySelector(":scope > .jin-rating-hover-zones");
            if (zones) {
                zones.title = "";
            }

            if (previousRating) {
                if (window.clearJinAnswerRating) {
                    window.clearJinAnswerRating({
                        previousRating,
                        reason,
                        runtimeSnapshotIndex: bubble.dataset.runtimeSnapshotIndex || null,
                    });
                }

                bubble.dispatchEvent(new CustomEvent("jin:answer-rating-cleared", {
                    bubbles: true,
                    detail: {
                        previousRating,
                        reason,
                    },
                }));
            }
        }

        function getCurrentRatingGateGeneration() {
            if (!window.getJinAnswerRatingL1GateState) {
                return 0;
            }

            const gateState = window.getJinAnswerRatingL1GateState() || {};
            return Number(gateState.waitingGeneration || gateState.generation || 0);
        }

        function isBubbleRatingL1Ready(bubble) {
            const generation = Number(bubble && bubble.dataset.ratingGateGeneration || 0);

            if (!generation) {
                return true;
            }

            if (!window.isJinAnswerRatingReadyForGateGeneration) {
                return false;
            }

            return Boolean(window.isJinAnswerRatingReadyForGateGeneration(generation));
        }

        function markBubbleRatingL1State(bubble) {
            if (!bubble) {
                return;
            }

            const blocked = isRatingInteractionBlocked();
            const ready = !blocked && isBubbleRatingL1Ready(bubble);
            bubble.dataset.ratingL1Ready = ready ? "true" : "false";
            bubble.classList.toggle("jin-rating-l1-waiting", !ready);

            const zones = bubble.querySelector(":scope > .jin-rating-hover-zones");
            if (zones && blocked) {
                zones.title = "rating is locked while JIN is generating";
            } else if (zones && !ready) {
                zones.title = "waiting for L1 snapshot before rating";
            } else if (zones && !bubble.dataset.ratingSelected) {
                zones.title = "";
            }
        }

        function addRatingHoverZones(root) {
            const scope = root instanceof Element ? root : document;

            scope.querySelectorAll(".jin-chat-bubble-service").forEach((bubble) => {
                if (bubble.querySelector(":scope > .jin-rating-hover-zones")) {
                    markBubbleRatingL1State(bubble);
                    return;
                }

                if (!bubble.dataset.ratingGateGeneration) {
                    bubble.dataset.ratingGateGeneration = String(getCurrentRatingGateGeneration());
                }

                markBubbleRatingL1State(bubble);

                const zones = document.createElement("div");
                zones.className = "jin-rating-hover-zones";
                zones.setAttribute("aria-hidden", "true");

                [
                    ["jin-rating-zone jin-rating-zone-minus", "minus", "negative feedback hover zone"],
                    ["jin-rating-zone jin-rating-zone-neutral", "neutral", "neutral feedback hover zone"],
                    ["jin-rating-zone jin-rating-zone-plus", "plus", "positive feedback hover zone"],
                ].forEach(([className, ratingValue, label]) => {
                    const zone = document.createElement("div");
                    zone.className = className;
                    zone.dataset.ratingValue = ratingValue;
                    zone.dataset.ratingHover = label;

                    zone.addEventListener("click", (event) => {
                        event.preventDefault();
                        event.stopPropagation();

                        if (
                            bubble.classList.contains("jin-rating-committed")
                            || bubble.dataset.ratingCommitted === "true"
                            || bubble.dataset.ratingPastTurn === "true"
                            || isRatingInteractionBlocked()
                        ) {
                            markBubbleRatingL1State(bubble);
                            return;
                        }

                        // Generation guard: if a newer turn has already been
                        // submitted, this bubble's gate generation is below the
                        // lock threshold — treat it as permanently committed.
                        const bubbleGen = Number(bubble.dataset.ratingGateGeneration || 0);
                        const gateState = window.getJinAnswerRatingL1GateState
                            ? window.getJinAnswerRatingL1GateState()
                            : {};
                        const lockedBelow = Number(gateState.lockedBelowGeneration || 0);
                        if (bubbleGen > 0 && bubbleGen < lockedBelow) {
                            bubble.classList.add("jin-rating-committed");
                            bubble.dataset.ratingCommitted = "true";
                            bubble.dataset.ratingPastTurn = "true";
                            markBubbleRatingL1State(bubble);
                            return;
                        }

                        markBubbleRatingL1State(bubble);

                        if (!isBubbleRatingL1Ready(bubble)) {
                            return;
                        }

                        const globalCounts = window.jinAnswerRatingCounts || {
                            minus: 0,
                            neutral: 0,
                            plus: 0,
                            total: 0,
                        };

                        globalCounts[ratingValue] = (globalCounts[ratingValue] || 0) + 1;
                        globalCounts.total = (globalCounts.total || 0) + 1;
                        window.jinAnswerRatingCounts = globalCounts;

                        const bubbleClickCount = Number(bubble.dataset.ratingClickCount || 0) + 1;
                        const bubbleRatingCountKey = `rating${ratingValue[0].toUpperCase()}${ratingValue.slice(1)}Count`;
                        const previousRating = bubble.dataset.ratingSelected || null;

                        bubble.dataset.ratingSelected = ratingValue;
                        bubble.dataset.ratingPending = "true";
                        bubble.dataset.ratingClickCount = String(bubbleClickCount);
                        bubble.dataset[bubbleRatingCountKey] = String(Number(bubble.dataset[bubbleRatingCountKey] || 0) + 1);

                        bubble.classList.remove(...ratingSelectionClasses);

                        const pressClass = `jin-rating-press-${ratingValue}`;
                        // Restart click animation even if the same zone is clicked twice.
                        void bubble.offsetWidth;

                        bubble.classList.add(
                            "jin-rating-selected-active",
                            `jin-rating-selected-${ratingValue}`,
                            pressClass
                        );

                        window.setTimeout(() => {
                            bubble.classList.remove(pressClass);
                        }, 680);

                        zones.title = `pending rating: ${ratingValue}; clicks: ${bubbleClickCount}; total: ${globalCounts.total}`;

                        const ratingDetail = {
                            rating: ratingValue,
                            previousRating,
                            bubbleClickCount,
                            pending: true,
                            globalCounts: { ...globalCounts },
                            runtimeSnapshotIndex: bubble.dataset.runtimeSnapshotIndex || null,
                            ratingGateGeneration: bubble.dataset.ratingGateGeneration || null,
                        };

                        if (window.recordJinAnswerRating) {
                            window.recordJinAnswerRating(ratingDetail);
                        }

                        bubble.dispatchEvent(new CustomEvent("jin:answer-rating-clicked", {
                            bubbles: true,
                            detail: ratingDetail,
                        }));
                    });

                    zones.appendChild(zone);
                });

                bubble.appendChild(zones);
            });
        }

        window.addEventListener("jin:l1-rating-gate-ready", () => {
            addRatingHoverZones(document);
        });

        window.addEventListener("jin:generation-state-changed", () => {
            document
                .querySelectorAll(".jin-chat-bubble-service")
                .forEach(markBubbleRatingL1State);
        });

        addRatingHoverZones(document);

        document.addEventListener("click", (event) => {
            if (event.target.closest(".jin-chat-bubble-service")) {
                return;
            }

            const answerRow = event.target.closest(".jin-message-row");
            if (
                !answerRow
                || !answerRow.querySelector(".jin-chat-bubble-service")
            ) {
                return;
            }

            answerRow
                .querySelectorAll(".jin-chat-bubble-service.jin-rating-selected-active:not(.jin-rating-committed)")
                .forEach((bubble) => clearBubbleRating(bubble, "answer-row-outside-bubble"));
        });

        const chatForm = document.getElementById("chat-form");
        if (chatForm) {
            chatForm.addEventListener("submit", () => {
                document
                    .querySelectorAll(".jin-chat-bubble-service.jin-rating-selected-active:not(.jin-rating-committed)")
                    .forEach((bubble) => {
                        bubble.classList.remove("jin-rating-selected-active");
                        bubble.classList.add("jin-rating-committed");
                        bubble.dataset.ratingPending = "false";
                        bubble.dataset.ratingCommitted = "true";

                        const zones = bubble.querySelector(":scope > .jin-rating-hover-zones");
                        if (zones) {
                            zones.title = `committed rating: ${bubble.dataset.ratingSelected || "unknown"}`;
                        }

                        bubble.dispatchEvent(new CustomEvent("jin:answer-rating-committed", {
                            bubbles: true,
                            detail: {
                                rating: bubble.dataset.ratingSelected || null,
                                bubbleClickCount: Number(bubble.dataset.ratingClickCount || 0),
                            },
                        }));
                    });
            });
        }

        const chatHistory = document.getElementById("chat-history");
        if (!chatHistory) {
            return;
        }

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        addRatingHoverZones(node);
                    }
                });
            });
        });

        observer.observe(chatHistory, {
            childList: true,
            subtree: true,
        });
    })();
</script>
